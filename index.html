<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dr. Simo — Médecin Généraliste</title>
  <meta name="description" content="Médecin généraliste — طبيب عام" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- App CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── NAVBAR ─────────────────────────────────────────── -->
  <header class="navbar" id="navbar">
    <div class="container navbar__inner">
      <span class="navbar__brand" id="nav-brand"></span>

      <nav class="navbar__links" id="nav-links" aria-label="main navigation">
        <a href="#about"   id="nav-about"></a>
        <a href="#services" id="nav-services"></a>
        <a href="#clinics" id="nav-clinics"></a>
  
      </nav>

      <div class="navbar__actions">
        <div class="language-selector">
  <button class="lang-toggle" id="lang-toggle" aria-label="Choose language">
    🌐 <span id="current-lang-label">AR</span>
  </button>

  <div class="language-menu" id="language-menu">
    <button type="button" data-lang="ar">العربية</button>
    <button type="button" data-lang="fr">Français</button>
    <button type="button" data-lang="en">English</button>
  </div>
</div>
        <button class="hamburger" id="hamburger" aria-label="Menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- Mobile nav overlay -->
  <div class="mobile-nav" id="mobile-nav" aria-hidden="true">
    <a href="#about"    id="mnav-about"    onclick="closeMobileNav()"></a>
    <a href="#services" id="mnav-services" onclick="closeMobileNav()"></a>
    <a href="#clinics"  id="mnav-clinics"  onclick="closeMobileNav()"></a>
    
  </div>

  <main>

    <!-- ── HERO ───────────────────────────────────────────── -->
    <section class="hero" id="hero">
      <div class="hero__bg-shape"></div>
      <div class="container hero__inner">
        <div class="hero__text">
          <p class="hero__eyebrow" id="hero-specialty"></p>
          <h1 class="hero__name" id="hero-name"></h1>
          <p class="hero__tagline" id="hero-tagline"></p>
          <div class="hero__actions">
            <a id="hero-btn-call" class="btn btn--primary" href="#">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.42 2 2 0 0 1 3.58 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.56a16 16 0 0 0 6.63 6.63l1.21-1.21a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              <span id="hero-btn-call-label"></span>
            </a>
            <a id="hero-btn-wa" class="btn btn--whatsapp" href="#">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
              <span id="hero-btn-wa-label"></span>
            </a>
          </div>
        </div>
        <div class="hero__photo-wrap">
          <div class="hero__photo-ring"></div>
          <img id="hero-photo" class="hero__photo" alt="Doctor photo" loading="eager" />
        </div>
      </div>
    </section>

    <!-- ── ABOUT ───────────────────────────────────────────── -->
    <section class="section section--light" id="about">
      <div class="container">
        <h2 class="section__title" id="about-title"></h2>
        <div class="about-card">
          <div class="about-card__accent"></div>
          <p id="about-text" class="about-card__text"></p>
        </div>
      </div>
    </section>

    <!-- ── SERVICES ───────────────────────────────────────── -->
    <section class="section" id="services">
      <div class="container">
        <h2 class="section__title" id="services-title"></h2>
        <div class="services-grid" id="services-grid"></div>
      </div>
    </section>

    <!-- ── QUALIFICATIONS ─────────────────────────────────── -->
    <section class="section section--navy" id="qualifications">
      <div class="container">
        <h2 class="section__title section__title--light" id="quals-title"></h2>
        <div class="quals-grid" id="quals-grid"></div>
      </div>
    </section>

    <!-- ── TODAY'S LOCATION ───────────────────────────────── -->
    <section class="section section--light" id="today">
      <div class="container">
        <h2 class="section__title" id="today-title"></h2>
        <div class="today-card" id="today-card">
          <div class="today-card__pulse"></div>
          <p id="today-text" class="today-card__text"></p>
        </div>
      </div>
    </section>

    <!-- ── CLINICS ─────────────────────────────────────────── -->
    <section class="section" id="clinics">
      <div class="container">
        <h2 class="section__title" id="clinics-title"></h2>
        <div class="clinics-grid" id="clinics-grid"></div>
      </div>
    </section>
  

  </main>

  <!-- ── FOOTER ─────────────────────────────────────────── -->
  <footer class="footer" id="footer">
    <div class="container footer__inner">
      <div class="footer__brand">
        <span id="footer-name"></span>
        <small id="footer-specialty"></small>
      </div>
      <div class="footer__contact">
        <a id="footer-phone-link" href="#" class="footer__link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.42 2 2 0 0 1 3.58 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.56a16 16 0 0 0 6.63 6.63l1.21-1.21a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          <span id="footer-phone-text"></span>
        </a>
        <a id="footer-wa-link" href="#" class="footer__link footer__link--wa">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
          <span id="footer-wa-text"></span>
        </a>
        <span class="footer__link footer__link--addr">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="footer-address"></span>
        </span>
      </div>
      <p class="footer__copy">
        &copy; <span id="footer-year"></span> <span id="footer-copy-name"></span> — <span id="footer-rights"></span>
      </p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
